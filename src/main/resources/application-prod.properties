# ==============================
# MySQL Database (Production)
# Set DB_USERNAME, DB_PASSWORD, and DB_INIT_MODE in your .env or container env
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurement_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==============================
# JPA Configuration
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${DB_INIT_MODE:validate}
spring.jpa.show-sql=false

# ==============================
# Connection Pool (HikariCP)
# ==============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ==============================
# H2 Console - Disabled in production
# ==============================
spring.h2.console.enabled=false

# ==============================
# Logging
# ==============================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO

# ==============================
# Actuator
# ==============================
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=never