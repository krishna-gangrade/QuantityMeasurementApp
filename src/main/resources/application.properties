# Application Configuration Properties
spring.application.name=Quantity Measurement App
server.port=8080

# Repository Type Configuration
repository.type=database

# --- MySQL Database Configuration ---
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurement_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA Configuration ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${DB_INIT_MODE:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# --- Logging Configuration ---
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.app.quantitymeasurement=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{5}:%line - %msg%n

# --- JWT Configuration ---
app.auth.tokenSecret=${APP_AUTH_TOKEN_SECRET}
app.auth.tokenExpirationMsec=${APP_AUTH_TOKEN_EXPIRATION_MSEC:864000000}
app.auth.refreshTokenExpirationMsec=${APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC:2592000000}

# --- Google OAuth2 Client Registration ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=email,profile

# --- Redirect Configuration ---
# This MUST be 4200 for Angular
app.oauth2.redirectUri=http://localhost:4200/login

# --- Email / SMTP Configuration ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
