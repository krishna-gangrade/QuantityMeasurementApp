# Application Configuration Properties
spring.application.name=Quantity Measurement App
server.port=8080

# Repository Type Configuration either "cache" or "database"
repository.type=database

# ─────────────────────────────────────────────────────────────────────────────
# MySQL Database Configuration
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurement_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ─────────────────────────────────────────────────────────────────────────────
# JPA Configuration
# DB_INIT_MODE options: create | create-drop | update | validate | none
# ─────────────────────────────────────────────────────────────────────────────

# JPA dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${DB_INIT_MODE:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─────────────────────────────────────────────────────────────────────────────
# Logging Configuration
# ─────────────────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.servlet.mvc=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.app.quantitymeasurement=DEBUG

# Enable request/exception details logging
spring.mvc.log-request-details=true
spring.mvc.log-resolved-exception=true

# Custom log pattern for console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{5}:%line - %msg%n

# ─────────────────────────────────────────────────────────────────────────────
# Swagger / OpenAPI
# ─────────────────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ─────────────────────────────────────────────────────────────────────────────
# Actuator
# ─────────────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.info.enabled=true

# ─────────────────────────────────────────────────────────────────────────────
# JWT Configuration
# APP_AUTH_TOKEN_SECRET: A Base64-encoded 64-byte secret for HMAC-SHA512 signing.
# Generate one via: openssl rand -base64 64
# Set this in your .env file (never hardcode here).
# ─────────────────────────────────────────────────────────────────────────────
app.auth.tokenSecret=${APP_AUTH_TOKEN_SECRET}
app.auth.tokenExpirationMsec=${APP_AUTH_TOKEN_EXPIRATION_MSEC:864000000}

# ─────────────────────────────────────────────────────────────────────────────
# OAuth2 Redirect URI
# The frontend URL to redirect to with the JWT after a successful Google login.
# ─────────────────────────────────────────────────────────────────────────────
app.oauth2.redirectUri=${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/login}

# ─────────────────────────────────────────────────────────────────────────────
# Google OAuth2 Client Registration
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in your .env file.
# Get credentials from: https://console.cloud.google.com/apis/credentials
# ─────────────────────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=email,profile

# ─────────────────────────────────────────────────────────────────────────────
# Refresh Token Configuration
# APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC: 30 days by default (2592000000 ms)
# ─────────────────────────────────────────────────────────────────────────────
app.auth.refreshTokenExpirationMsec=${APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC:2592000000}

# ─────────────────────────────────────────────────────────────────────────────
# Email / SMTP Configuration (Gmail example)
# Set MAIL_USERNAME and MAIL_PASSWORD in your .env file.
# For Gmail: enable 2FA and generate an App Password.
# ─────────────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000

# Enable async processing (used by EmailService for non-blocking email sending)
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100