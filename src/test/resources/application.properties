# =============================================================
# Test Configuration - overrides main application.properties
# Uses H2 in-memory with create-drop for clean test isolation
# =============================================================
spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Suppress excessive Hibernate logging in tests
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.hibernate.SQL=WARN

# Swagger and Actuator in test
springdoc.swagger-ui.enabled=true


management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics
