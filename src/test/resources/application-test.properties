# Test Environment Configuration

repository.type=database
app.env=test

# In-memory H2 database for testing
db.url=jdbc:h2:mem:testdb
db.username=sa
db.password=
db.driver=org.h2.Driver

# Smaller connection pool for tests
db.hikari.maximum-pool-size=5
db.hikari.minimum-idle=1
db.hikari.connection-timeout=20000
db.hikari.idle-timeout=300000
db.hikari.max-lifetime=900000
db.hikari.pool-name=QuantityMeasurementTestPool
db.hikari.connection-test-query=SELECT 1